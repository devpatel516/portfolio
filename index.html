<!doctype html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/logos/logo.jpg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dev Patel — Full-Stack & AI Developer</title>
  <meta name="description" content="Portfolio of Dev Patel, a Computer Science student at Nirma University specializing in Full-Stack Development and Artificial Intelligence." />

  <!-- Fonts: Syne (display) + JetBrains Mono (body/code) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "var(--primary)",
            "primary-dim": "var(--primary-dim)",
            "bg-base": "#080C10",
            "bg-surface": "#0E1318",
            "bg-elevated": "#141A22",
            "border-subtle": "#1C242E",
            "border-mid": "#253040",
            "text-primary": "#E8EDF2",
            "text-secondary": "#7A8899",
            "text-muted": "#4A5568",
          },
          fontFamily: {
            "display": ["Syne", "sans-serif"],
            "mono": ["JetBrains Mono", "monospace"],
          },
          boxShadow: {
            'glow-sm': '0 0 15px -5px var(--primary-glow)',
            'glow': '0 0 40px -10px var(--primary-glow)',
            'glow-lg': '0 0 80px -10px var(--primary-glow)',
          }
        },
      },
    }
  </script>
</head>

<body
  class="bg-[#080C10] min-h-screen flex flex-col font-mono text-[#E8EDF2] overflow-x-hidden selection:bg-[var(--primary)] selection:text-[#080C10]">
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
